<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Verification 2.0</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .dark {
            background-color: #1a1a1a;
            color: white;
        }

        .light {
            background-color: #f0f0f0;
            color: black;
        }

        img {
            max-width: 100px;
            height: auto;
            border: 1px dashed red;
        }
    </style>
</head>

<body>
    <h1>Icon Verification 2.0 (Red border shows image edges)</h1>

    <h2>Dark Background</h2>
    <div class="grid">
        <div class="card dark">
            <p>icon.png (Transparent)</p>
            <img src="icon.png" alt="icon.png">
        </div>
        <div class="card dark">
            <p>apple-touch-icon.png (Opaque Purple)</p>
            <img src="apple-touch-icon.png" alt="apple">
        </div>
        <div class="card dark">
            <p>maskable (Opaque Purple)</p>
            <img src="android-chrome-maskable-512x512.png" alt="maskable">
        </div>
        <div class="card dark">
            <p>favicon.ico</p>
            <img src="favicon.ico" alt="favicon">
        </div>
    </div>

    <h2>Light Background</h2>
    <div class="grid">
        <div class="card light">
            <p>icon.png (Transparent)</p>
            <img src="icon.png" alt="icon.png">
        </div>
        <div class="card light">
            <p>apple-touch-icon.png (Opaque Purple)</p>
            <img src="apple-touch-icon.png" alt="apple">
        </div>
        <div class="card light">
            <p>maskable (Opaque Purple)</p>
            <img src="android-chrome-maskable-512x512.png" alt="maskable">
        </div>
    </div>
</body>

</html>
